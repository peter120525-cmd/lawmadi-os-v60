name: Lawmadi OS Health Monitor

on:
  # 6시간마다 헬스체크만 실행
  schedule:
    - cron: '0 */6 * * *'
  # 수동 실행 지원
  workflow_dispatch:
    inputs:
      include_simulation:
        description: '시뮬레이션 포함 여부'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  API_URL: https://lawmadi-os-v60-938146962157.asia-northeast3.run.app

jobs:
  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Health Check
        id: health
        run: |
          python - <<'PYEOF'
          import requests, json, time, sys, os

          API = "${{ env.API_URL }}"

          # ── Cold Start 워밍업 (점수 미반영) ──
          print("🔥 워밍업 (Cold Start 대응)")
          for attempt in range(3):
              try:
                  s = time.time()
                  r = requests.get(f"{API}/health", timeout=30)
                  ms = (time.time() - s) * 1000
                  print(f"  #{attempt+1}: HTTP {r.status_code} ({ms:.0f}ms)")
                  if r.status_code == 200:
                      break
              except Exception as e:
                  print(f"  #{attempt+1}: {e}")
              time.sleep(5)
          print()

          # ── 본 체크 ──
          results = {"checks": [], "pass": 0, "fail": 0, "critical_fail": False}

          def check(name, func, critical=False):
              try:
                  ok, msg, ms = func()
                  icon = "✅" if ok else "❌"
                  results["pass" if ok else "fail"] += 1
                  if not ok and critical:
                      results["critical_fail"] = True
                  results["checks"].append({"name": name, "ok": ok, "msg": msg, "ms": ms})
                  print(f"{icon} {name}: {msg} ({ms:.0f}ms)")
                  return ok
              except Exception as e:
                  results["fail"] += 1
                  if critical:
                      results["critical_fail"] = True
                  results["checks"].append({"name": name, "ok": False, "msg": str(e)[:100], "ms": 0})
                  print(f"❌ {name}: {e}")
                  return False

          INTERNAL_KEY = "${{ secrets.INTERNAL_API_KEY }}"
          AUTH_HEADER = {"Authorization": f"Bearer {INTERNAL_KEY}"} if INTERNAL_KEY else {}

          # 1. /health 엔드포인트 (critical — 실패 시 서비스 다운)
          def check_health():
              s = time.time()
              r = requests.get(f"{API}/health", timeout=30)
              ms = (time.time() - s) * 1000
              data = r.json()
              status = data.get("status", "")
              version = data.get("os_version", "?")
              return status == "online", f"status={status}, version={version}", ms

          check("Health Endpoint", check_health, critical=True)

          # 2. API 응답 시간 (informational — 느려도 서비스 자체는 정상)
          def check_latency():
              s = time.time()
              r = requests.get(f"{API}/health", timeout=30)
              ms = (time.time() - s) * 1000
              ok = ms < 5000
              return ok, f"{ms:.0f}ms {'(정상)' if ok else '(느림!)'}", ms

          check("API Latency", check_latency)

          # 3. 핵심 모듈 상태 (critical)
          def check_modules():
              if not INTERNAL_KEY:
                  return True, "INTERNAL_API_KEY 미설정 (스킵)", 0
              s = time.time()
              r = requests.get(f"{API}/diagnostics", headers=AUTH_HEADER, timeout=15)
              ms = (time.time() - s) * 1000
              if r.status_code != 200:
                  return False, f"HTTP {r.status_code}", ms
              modules = r.json().get("modules", {})
              critical = ["gemini_key", "swarm_orchestrator", "clevel_handler"]
              missing = [m for m in critical if not modules.get(m, False)]
              ok = len(missing) == 0
              return ok, f"{'모두 활성' if ok else f'비활성: {missing}'}", ms

          check("Critical Modules", check_modules, critical=True)

          # 4. Gemini 모델 상태
          def check_gemini():
              if not INTERNAL_KEY:
                  return True, "INTERNAL_API_KEY 미설정 (스킵)", 0
              s = time.time()
              r = requests.get(f"{API}/diagnostics", headers=AUTH_HEADER, timeout=15)
              ms = (time.time() - s) * 1000
              if r.status_code != 200:
                  return False, f"HTTP {r.status_code}", ms
              model = r.json().get("gemini_model", "unknown")
              return "gemini" in model.lower(), f"model={model}", ms

          check("Gemini Model", check_gemini, critical=True)

          # 결과 요약
          total = results["pass"] + results["fail"]
          print(f"\n{'='*50}")
          print(f"결과: {results['pass']}/{total} 통과")
          status = "FAIL" if results["critical_fail"] else ("OK" if results["fail"] == 0 else "DEGRADED")
          print(f"상태: {status}")

          gh_out = os.environ.get("GITHUB_OUTPUT", "")
          if gh_out:
              with open(gh_out, "a") as f:
                  f.write(f"status={status}\n")
                  f.write(f"pass_count={results['pass']}\n")
                  f.write(f"total_count={total}\n")

          # critical 실패만 step 실패 처리 (latency 느림은 DEGRADED로 경고만)
          if results["critical_fail"]:
              sys.exit(1)
          PYEOF

      - name: Simulation Test
        if: ${{ always() && github.event.inputs.include_simulation == 'true' }}
        id: simulation
        run: |
          python - <<'PYEOF'
          import requests, json, time, sys

          API = "${{ env.API_URL }}"
          TIMEOUT = 120  # Cold Start 고려 (60→120초)
          INTERNAL_KEY = "${{ secrets.INTERNAL_API_KEY }}"
          HEADERS = {"X-Admin-Key": INTERNAL_KEY} if INTERNAL_KEY else {}

          # 1단계: 워밍업 (Cold Start 대응, 점수 미반영)
          print("🔥 워밍업 (Cold Start 대응)")
          # /health 워밍업은 Health Check 단계에서 이미 수행됨 — /ask 파이프라인만 워밍업
          for attempt in range(2):
              try:
                  s = time.time()
                  r = requests.post(f"{API}/ask", json={"query": "안녕하세요"}, headers=HEADERS, timeout=TIMEOUT)
                  ms = (time.time() - s) * 1000
                  print(f"  워밍업 #{attempt+1}: HTTP {r.status_code} ({ms/1000:.1f}s)")
                  if r.status_code in (200, 429):
                      break
              except Exception as e:
                  ms = (time.time() - s) * 1000
                  print(f"  워밍업 #{attempt+1}: 타임아웃 ({ms/1000:.1f}s)")
              time.sleep(5)
          time.sleep(10)

          # 2단계: 실제 시뮬레이션
          print("\n📋 시뮬레이션 시작")
          scenarios = [
              {"query": "부당해고 구제 방법 알려주세요", "category": "labor"},
              {"query": "전세 보증금 3억인데 집주인이 안 돌려줘요", "category": "lease"},
              {"query": "사기죄 고소장 작성 방법을 알려주세요", "category": "criminal"},
          ]

          pass_count = 0
          results = []
          delay = 15.0  # Rate limit 방지 (free 플랜 3회/4시간)

          for i, sc in enumerate(scenarios):
              s = time.time()
              try:
                  r = requests.post(f"{API}/ask", json={"query": sc["query"]}, headers=HEADERS, timeout=TIMEOUT)
                  ms = (time.time() - s) * 1000
                  if r.status_code == 200:
                      data = r.json()
                      resp_len = len(data.get("response", ""))
                      leader = data.get("leader", "?")
                      ok = data.get("status") == "SUCCESS" and resp_len >= 50
                  elif r.status_code == 429:
                      # Rate limit = 서비스는 정상, 요청 제한일 뿐
                      resp_len, leader, ok = 0, "RATE_LIM", True
                  else:
                      resp_len, leader, ok = 0, "N/A", False
              except Exception as e:
                  ms = (time.time() - s) * 1000
                  resp_len, leader, ok = 0, "ERR", False

              if ok:
                  pass_count += 1
              icon = "✅" if ok else "❌"
              print(f"{icon} #{i+1} [{sc['category']}] leader={leader} {ms/1000:.1f}s {resp_len}자")
              results.append({"ok": ok, "cat": sc["category"], "leader": leader, "ms": round(ms)})

              if i < len(scenarios) - 1:
                  time.sleep(delay)

          total = len(scenarios)
          print(f"\n{'='*50}")
          print(f"시뮬레이션: {pass_count}/{total} 성공")

          import os
          gh_out = os.environ.get("GITHUB_OUTPUT", "")
          if gh_out:
              with open(gh_out, "a") as f:
                  f.write(f"sim_pass={pass_count}\n")
                  f.write(f"sim_total={total}\n")

          # 1/3 이하만 실패 처리 (2/3 통과 허용)
          if pass_count < max(1, total // 3):
              print("⚠️ 시뮬레이션 성공률 33% 미달!")
              sys.exit(1)
          PYEOF

      - name: Generate Report
        if: always()
        run: |
          echo "## Lawmadi OS Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **시간**: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: ${{ env.API_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **헬스체크**: ${{ steps.health.outcome == 'success' && '✅ 정상' || '❌ 이상' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **시뮬레이션**: ${{ steps.simulation.outcome == 'success' && '✅ 정상' || steps.simulation.outcome == 'skipped' && '⏭️ 스킵' || '❌ 실패' }}" >> $GITHUB_STEP_SUMMARY

      - name: Auto Recovery (on failure)
        if: failure()
        run: |
          echo "🔄 자동 복구 시도..."
          python - <<'PYEOF'
          import requests, time

          API = "${{ env.API_URL }}"

          # 워밍업 요청 3회
          for i in range(3):
              try:
                  r = requests.get(f"{API}/health", timeout=15)
                  print(f"워밍업 #{i+1}: HTTP {r.status_code}")
                  if r.status_code == 200:
                      print("✅ 서비스 정상 복구 확인")
                      break
              except Exception as e:
                  print(f"❌ 워밍업 #{i+1} 실패: {e}")
              time.sleep(10)
          PYEOF
