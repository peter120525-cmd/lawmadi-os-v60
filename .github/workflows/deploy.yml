name: Build & Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os
  REPO: lawmadi-images
  IMAGE: lawmadi-os

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 GCP 인증
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # 🐳 Artifact Registry 인증
      - name: Configure Docker for Artifact Registry
        shell: bash
        run: |
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      # 🏗️ Docker Build & Push
      - name: Build & Push image
        shell: bash
        run: |
          set -euo pipefail

          REPO_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"
          TAG="${GITHUB_SHA}"

          docker build -t "${REPO_PATH}:${TAG}" .
          docker push "${REPO_PATH}:${TAG}"

          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${REPO_PATH}:${TAG}" | awk -F@ '{print $2}')"
          if [[ -z "${DIGEST}" ]]; then
            echo "❌ Failed to read image digest"
            exit 1
          fi

          echo "REPO_PATH=${REPO_PATH}" >> "$GITHUB_ENV"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"

      # 🚀 Cloud Run Deploy
      - name: Deploy to Cloud Run (digest-based)
        shell: bash
        run: |
          set -euo pipefail

          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${REPO_PATH}@${DIGEST}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --allow-unauthenticated \
            --set-env-vars "\
DB_USER=${{ secrets.DB_USER }},\
DB_PASS=${{ secrets.DB_PASS }},\
DB_NAME=${{ secrets.DB_NAME }},\
CLOUD_SQL_INSTANCE=${{ secrets.CLOUD_SQL_INSTANCE }},\
ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"

