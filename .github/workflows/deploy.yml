name: Build & Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os
  REPO: lawmadi-images
  IMAGE: lawmadi-os

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # ✅ 추가

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 기존 키 방식 유지
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build & Push image
        run: |
          set -euo pipefail
          REPO_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"
          TAG="${GITHUB_SHA}"
          docker build -t "${REPO_PATH}:${TAG}" .
          docker push "${REPO_PATH}:${TAG}"
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${REPO_PATH}:${TAG}" | awk -F@ '{print $2}')"
          if [[ -z "${DIGEST}" ]]; then exit 1; fi
          echo "REPO_PATH=${REPO_PATH}" >> "$GITHUB_ENV"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run (pushed digest)
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${REPO_PATH}@${DIGEST}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --set-env-vars DB_DISABLED=1
