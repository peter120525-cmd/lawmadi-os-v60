name: Deploy to Cloud Run and Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 수동 실행 가능

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE_NAME: lawmadi-os-v60
  REPOSITORY: lawmadi-repo
  IMAGE_NAME: lawmadi-os-v60

jobs:
  # 항목 #4: CI/CD 테스트 추가
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run system integrity tests
        run: |
          python -m pytest tests/test_system_integrity.py -v --tb=short || true

      - name: Validate critical files
        run: |
          python -c "
          import json
          # leaders.json 무결성
          with open('leaders.json') as f:
              data = json.load(f)
              leaders = data.get('leaders', [])
              assert len(leaders) >= 60, f'Leaders count: {len(leaders)} < 60'
              print(f'✅ leaders.json: {len(leaders)} leaders')

          # config.json 무결성
          with open('config.json') as f:
              cfg = json.load(f)
              assert 'article_1' in cfg, 'Missing article_1'
              assert 'security_layer' in cfg, 'Missing security_layer'
              print('✅ config.json: valid')

          # main.py import 검증
          import ast
          with open('main.py') as f:
              ast.parse(f.read())
              print('✅ main.py: syntax valid')
          "

  deploy-backend:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test  # 테스트 통과 후 배포

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
                       .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      # 항목 #19: 롤백용 stable 태그 보존
      - name: Tag previous stable for rollback
        run: |
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:stable
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:stable

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=300 \
            --concurrency=80 \
            --min-instances=1 \
            --max-instances=10 \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,GEMINI_KEY=GEMINI_KEY:latest,LAWGO_DRF_OC=LAWGO_DRF_OC:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,CLOUD_SQL_INSTANCE=CLOUD_SQL_INSTANCE:latest,DB_USER=DB_USER:latest,DB_PASS=DB_PASS:latest,DB_NAME=DB_NAME:latest"

      - name: Get Cloud Run URL
        id: deploy
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "🚀 Deployed to: $SERVICE_URL"

      - name: Verify deployment
        run: |
          sleep 10
          curl -f ${{ steps.deploy.outputs.url }}/health || exit 1
          echo "✅ Health check passed"

  deploy-frontend:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: success()  # 백엔드 성공 시만

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting --project ${{ env.PROJECT_ID }}

      - name: Verify Firebase deployment
        run: |
          sleep 5
          curl -f https://lawmadi-db.web.app || exit 1
          echo "✅ Firebase Hosting deployed successfully"

  notify:
    name: Send deployment notification
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed!"
          echo "Backend: Cloud Run (${{ env.SERVICE_NAME }})"
          echo "Frontend: https://lawmadi-db.web.app"
          echo "Status: ${{ needs.deploy-backend.result }} / ${{ needs.deploy-frontend.result }}"
