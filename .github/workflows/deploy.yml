name: Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os
  REPO: lawmadi-images
  IMAGE: lawmadi-os

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode base64 key to JSON (runner temp)
        id: key
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > "${{ runner.temp }}/gcp-sa.json"
          # Export JSON content as a single line for auth@v2
          echo "CRED_JSON<<EOF" >> $GITHUB_ENV
          cat "${{ runner.temp }}/gcp-sa.json" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          # sanity check
          head -n 1 "${{ runner.temp }}/gcp-sa.json" | cat

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.CRED_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run (latest digest)
        run: |
          REPO_PATH="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}"

          echo "Looking up latest digest from: ${REPO_PATH}"
          DIGEST=$(gcloud artifacts docker images list ${REPO_PATH} --format="value(DIGEST)" --limit=1)

          if [ -z "${DIGEST}" ]; then
            echo "No digest found for ${REPO_PATH}"
            exit 1
          fi

          echo "Using digest: ${DIGEST}"
          gcloud run deploy ${SERVICE} \
            --image ${REPO_PATH}@${DIGEST} \
            --region ${REGION} \
            --project ${PROJECT_ID} \
            --allow-unauthenticated
