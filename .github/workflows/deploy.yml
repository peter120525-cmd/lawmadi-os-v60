name: Build & Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os
  REPO: lawmadi-images
  IMAGE: lawmadi-os

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build & Push image
        shell: bash
        run: |
          set -euo pipefail

          REPO_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"
          TAG="${GITHUB_SHA}"

          echo "Building: ${REPO_PATH}:${TAG}"
          docker build -t "${REPO_PATH}:${TAG}" .

          echo "Pushing: ${REPO_PATH}:${TAG}"
          docker push "${REPO_PATH}:${TAG}"

          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${REPO_PATH}:${TAG}" | awk -F@ '{print $2}')"
          if [[ -z "${DIGEST}" ]]; then
            echo "Failed to read digest after push"
            exit 1
          fi

          echo "REPO_PATH=${REPO_PATH}" >> "$GITHUB_ENV"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"
          echo "Using digest: ${DIGEST}"

      - name: Deploy to Cloud Run (pushed digest)
        shell: bash
        run: |
          set -euo pipefail
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${REPO_PATH}@${DIGEST}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --allow-unauthenticated
