name: Build & Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os
  REPO: lawmadi-images
  IMAGE: lawmadi-os
  # IT 기술: Cloud SQL 인스턴스 연결 이름 정의
  CLOUD_SQL_INSTANCE: lawmadi-db:asia-northeast3:lawmadi-db-v1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build & Push image
        run: |
          set -euo pipefail

          REPO_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"
          TAG="${GITHUB_SHA}"

          # IT 기술: Docker 레이어 캐싱 및 멀티 스테이지 빌드 최적화 권장
          docker build -t "${REPO_PATH}:${TAG}" .
          docker push "${REPO_PATH}:${TAG}"

          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "${REPO_PATH}:${TAG}" | awk -F@ '{print $2}')"
          echo "REPO_PATH=${REPO_PATH}" >> "$GITHUB_ENV"
          echo "DIGEST=${DIGEST}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run (Hardened Configuration)
        run: |
          set -euo pipefail

          # [IT 기술: Secure Environment Injection & Instance Tunneling]
          # --set-env-vars를 통해 GitHub Secrets에 저장된 기밀 데이터를 안전하게 커널로 전달합니다.
          # --add-cloudsql-instances를 통해 백엔드와 DB 간의 보안 터널을 생성합니다.
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$REPO_PATH@$DIGEST" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --set-env-vars "GEMINI_KEY=${{ secrets.GEMINI_KEY }}" \
            --set-env-vars "LAWGO_DRF_OC=${{ secrets.LAWGO_DRF_OC }}" \
            --set-env-vars "DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars "DB_PASS=${{ secrets.DB_PASS }}" \
            --set-env-vars "DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars "CLOUD_SQL_INSTANCE=${{ env.CLOUD_SQL_INSTANCE }}" \
            --set-env-vars "DB_DISABLED=0" \
            --add-cloudsql-instances "${{ env.CLOUD_SQL_INSTANCE }}" \
            --allow-unauthenticated