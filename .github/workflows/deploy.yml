name: Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Ensure Artifact Registry repo exists (cloud-run-source-deploy)
        run: |
          gcloud config set project $PROJECT_ID
          if gcloud artifacts repositories describe cloud-run-source-deploy --location=$REGION >/dev/null 2>&1; then
            echo "Artifact Registry repo already exists: cloud-run-source-deploy"
          else
            echo "Creating Artifact Registry repo: cloud-run-source-deploy"
            gcloud artifacts repositories create cloud-run-source-deploy \
              --repository-format=docker \
              --location=$REGION \
              --description="Cloud Run source deploy images"
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --source . \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated
