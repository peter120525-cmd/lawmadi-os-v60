name: Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os
  AR_REPO: lawmadi-images
  IMAGE: lawmadi-os

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # GCP 인증 (GitHub Secret: GCP_SA_KEY)
      - uses: google/github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google/github-actions/setup-gcloud@v2

      # Docker → Artifact Registry 푸시
      - name: Auth Docker
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      # Cloud Run 배포
      - name: Deploy to Cloud Run
        env:
          LAWGO_DRF_OC: ${{ secrets.LAWGO_DRF_OC }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
          CLOUD_SQL_INSTANCE: ${{ secrets.CLOUD_SQL_INSTANCE }}
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${IMAGE_TAG} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances ${CLOUD_SQL_INSTANCE} \
            --set-env-vars \
              LAWGO_DRF_OC=${LAWGO_DRF_OC},\
              ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY},\
              DB_USER=${DB_USER},\
              DB_PASS=${DB_PASS},\
              DB_NAME=${DB_NAME},\
              CLOUD_SQL_INSTANCE=${CLOUD_SQL_INSTANCE} \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 60
