name: Deploy Lawmadi OS to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE: lawmadi-os
  REPO: lawmadi-images
  IMAGE: lawmadi-os

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run (latest digest)
        shell: bash
        run: |
          set -euo pipefail

          REPO_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}"

          echo "Looking up latest digest from: ${REPO_PATH}"
          DIGEST="$(gcloud artifacts docker images list "${REPO_PATH}" \
            --sort-by=~UPDATE_TIME \
            --limit=1 \
            --format='get(digest)')"

          if [[ -z "${DIGEST}" ]]; then
            echo "No digest found for ${REPO_PATH}"
            exit 1
          fi

          echo "Using digest: ${DIGEST}"
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${REPO_PATH}@${DIGEST}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --allow-unauthenticated
