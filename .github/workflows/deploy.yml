name: Deploy to Cloud Run and Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 수동 실행 가능

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: lawmadi-db
  REGION: asia-northeast3
  SERVICE_NAME: lawmadi-os-v60
  REPOSITORY: lawmadi-repo
  IMAGE_NAME: lawmadi-os-v60

jobs:
  # 항목 #4: CI/CD 테스트 추가
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx pip-audit

      - name: Audit dependencies for vulnerabilities
        run: |
          pip-audit --strict --desc

      - name: Run unit tests (pure functions)
        run: |
          python -m pytest tests/test_unit_pure.py -v --tb=short

      - name: Run NLU leader matching tests
        run: |
          python -m pytest tests/test_leader_matching.py -v --tb=short

      - name: Run verifier parse tests
        run: |
          python -m pytest tests/test_verifier_parse.py -v --tb=short

      - name: Run system integrity tests
        run: |
          python -m pytest tests/test_system_integrity.py -v --tb=short

      - name: Validate critical files
        run: |
          python -c "
          import json
          # leaders.json 무결성
          with open('leaders.json') as f:
              data = json.load(f)
              registry = data.get('swarm_engine_config', {}).get('leader_registry', {})
              assert len(registry) >= 60, f'Leaders count: {len(registry)} < 60'
              print(f'✅ leaders.json: {len(registry)} leaders')

          # config.json 무결성
          with open('config.json') as f:
              cfg = json.load(f)
              assert 'article1' in cfg, 'Missing article1'
              assert 'security_layer' in cfg, 'Missing security_layer'
              print('✅ config.json: valid')

          # main.py import 검증
          import ast
          with open('main.py') as f:
              ast.parse(f.read())
              print('✅ main.py: syntax valid')
          "

  # ─── Staging: 프로덕션 전 스모크 테스트 ───
  deploy-staging:
    name: Deploy to Staging (Smoke Test)
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --load \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Staging
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-staging \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=1 \
            --timeout=300 \
            --concurrency=15 \
            --min-instances=1 \
            --max-instances=2 \
            --set-env-vars="ENABLE_LAWMADILM=false,LAWMADILM_TIMEOUT=3,USE_VERTEX_AI=true,VERTEX_PROJECT=lawmadi-db,VERTEX_LOCATION=asia-northeast3,USE_VERTEX_SEARCH=true,GCP_PROJECT_ID=lawmadi-db,VERTEX_SEARCH_DATA_STORE_ID=lawmadi-legal-cache,VERTEX_SEARCH_ENGINE_ID=lawmadi-search-engine,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,PADDLE_ENVIRONMENT=sandbox,DAILY_FREE_LIMIT=2,SESSION_EXPIRY_DAYS=30" \
            --set-secrets="GEMINI_KEY=GEMINI_KEY:latest,LAWGO_DRF_OC=LAWGO_DRF_OC:latest,CLOUD_SQL_INSTANCE=CLOUD_SQL_INSTANCE:latest,DB_USER=DB_USER:latest,DB_PASS=DB_PASS:latest,DB_NAME=DB_NAME:latest,MCP_API_KEY=MCP_API_KEY:latest,API_KEYS=API_KEYS:latest,DATABASE_URL=DATABASE_URL_STAGING:latest,INTERNAL_API_KEY=INTERNAL_API_KEY:latest,PREMIUM_KEYS=PREMIUM_KEYS:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,PADDLE_CLIENT_TOKEN=PADDLE_CLIENT_TOKEN:latest,SMTP_USER=SMTP_USER:latest,SMTP_FROM=SMTP_FROM:latest"

      - name: Get Staging URL
        id: staging
        run: |
          STAGING_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}-staging \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$STAGING_URL" >> $GITHUB_OUTPUT
          echo "🧪 Staging deployed to: $STAGING_URL"

      - name: Smoke test staging
        run: |
          sleep 10
          STAGING_URL="${{ steps.staging.outputs.url }}"
          echo "🔍 Running smoke tests on staging..."
          # Health check + version 검증
          HEALTH=$(curl -sf --max-time 15 "$STAGING_URL/health") || { echo "❌ /health 응답 실패"; exit 1; }
          echo "$HEALTH"
          echo "$HEALTH" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              assert d.get('status') == 'online', f'status={d.get(\"status\")}'
              print(f'✅ /health passed: status={d[\"status\"]}, version={d.get(\"os_version\", \"?\")}'  )
          except (json.JSONDecodeError, AssertionError) as e:
              print(f'❌ /health 검증 실패: {e}')
              sys.exit(1)
          " || exit 1

          # Integration: /leaders 엔드포인트 검증
          LEADERS=$(curl -sf --max-time 15 "$STAGING_URL/leaders") || { echo "❌ /leaders 응답 실패"; exit 1; }
          echo "$LEADERS" | python3 -c "
          import sys, json
          try:
              d = json.loads(sys.stdin.read())
              leaders = d if isinstance(d, list) else d.get('leaders', [])
              assert len(leaders) >= 60, f'Leaders count: {len(leaders)} < 60'
              print(f'✅ /leaders passed: {len(leaders)} leaders')
          except (json.JSONDecodeError, AssertionError) as e:
              print(f'❌ /leaders 검증 실패: {e}')
              sys.exit(1)
          " || exit 1

          # Integration: 정적 파일 응답 확인
          curl -sf --max-time 10 "$STAGING_URL/" > /dev/null || { echo "❌ / (index.html) 응답 실패"; exit 1; }
          echo "✅ / (index.html) passed"

          echo "🎉 All staging smoke + integration tests passed"

  # ─── Production: 수동 승인 게이트 ───
  deploy-backend:
    name: Deploy to Production (Cloud Run)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production  # GitHub Environment 수동 승인 게이트

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 항목 #19: 롤백용 stable 태그 보존 (현재 프로덕션 이미지를 rollback으로 저장)
      - name: Tag current production as rollback
        run: |
          docker pull ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:stable || true
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:stable \
                     ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:rollback 2>/dev/null || true
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:rollback 2>/dev/null || true

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=1 \
            --timeout=300 \
            --concurrency=15 \
            --min-instances=1 \
            --max-instances=5 \
            --set-env-vars="ENABLE_LAWMADILM=false,LAWMADILM_TIMEOUT=3,USE_VERTEX_AI=true,VERTEX_PROJECT=lawmadi-db,VERTEX_LOCATION=asia-northeast3,USE_VERTEX_SEARCH=true,GCP_PROJECT_ID=lawmadi-db,VERTEX_SEARCH_DATA_STORE_ID=lawmadi-legal-cache,VERTEX_SEARCH_ENGINE_ID=lawmadi-search-engine,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,PADDLE_ENVIRONMENT=sandbox,DAILY_FREE_LIMIT=2,SESSION_EXPIRY_DAYS=30" \
            --set-secrets="GEMINI_KEY=GEMINI_KEY:latest,LAWGO_DRF_OC=LAWGO_DRF_OC:latest,CLOUD_SQL_INSTANCE=CLOUD_SQL_INSTANCE:latest,DB_USER=DB_USER:latest,DB_PASS=DB_PASS:latest,DB_NAME=DB_NAME:latest,MCP_API_KEY=MCP_API_KEY:latest,API_KEYS=API_KEYS:latest,DATABASE_URL=DATABASE_URL:latest,INTERNAL_API_KEY=INTERNAL_API_KEY:latest,PREMIUM_KEYS=PREMIUM_KEYS:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,PADDLE_CLIENT_TOKEN=PADDLE_CLIENT_TOKEN:latest,SMTP_USER=SMTP_USER:latest,SMTP_FROM=SMTP_FROM:latest"

      - name: Get Cloud Run URL
        id: deploy
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "🚀 Deployed to: $SERVICE_URL"

      - name: Verify production deployment
        run: |
          sleep 10
          curl -f ${{ steps.deploy.outputs.url }}/health || exit 1
          echo "✅ Production health check passed"

      - name: Tag verified image as stable
        run: |
          docker pull ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:stable
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:stable

  deploy-frontend:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: success()  # 백엔드 성공 시만

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          firebase deploy --only hosting --project ${{ env.PROJECT_ID }}

      - name: Verify Firebase deployment
        run: |
          sleep 5
          curl -f https://lawmadi-db.web.app || exit 1
          echo "✅ Firebase Hosting deployed successfully"

  notify:
    name: Send deployment notification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed!"
          echo "Staging: ${{ needs.deploy-staging.result }}"
          echo "Backend: Cloud Run (${{ env.SERVICE_NAME }}) — ${{ needs.deploy-backend.result }}"
          echo "Frontend: https://lawmadi-db.web.app — ${{ needs.deploy-frontend.result }}"
