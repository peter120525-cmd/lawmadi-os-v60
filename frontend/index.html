<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Lawmadi OS</title>
  <style>
    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f8fa;
    }
    header {
      padding: 20px;
      text-align: center;
      font-weight: 700;
    }
    #chat {
      max-width: 720px;
      margin: 40px auto;
      padding: 20px;
    }
    .bubble {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .user {
      background: #2563eb;
      color: #fff;
      text-align: right;
    }
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 12px;
      background: #fff;
      display: flex;
      gap: 8px;
      border-top: 1px solid #eee;
    }
    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    button {
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <header>법마디 Lawmadi OS</header>

  <div id="chat">
    <div class="bubble">
      안녕하세요 👋<br />
      상황을 한 줄로 말씀해 주세요.<br />
      예: “전세보증금을 못 돌려받고 있어요”
    </div>
  </div>

  <footer>
    <input id="input" placeholder="상황을 입력하세요..." />
    <button onclick="send()">전송</button>
  </footer>

  <script>
    const CHAT = document.getElementById("chat");
    const INPUT = document.getElementById("input");

    async function send() {
      const text = INPUT.value.trim();
      if (!text) return;

      append(text, "user");
      INPUT.value = "";

      append("정리 중입니다…", "ai", true);

      const res = await fetch("https://lawmadi-os-938146962157.asia-northeast3.run.app/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: text })
      });

      const data = await res.json();
      replaceLast(data.response || "응답을 생성하지 못했습니다.");
    }

    function append(text, role, loading=false) {
      const div = document.createElement("div");
      div.className = `bubble ${role}`;
      div.innerText = text;
      if (loading) div.dataset.loading = "1";
      CHAT.appendChild(div);
      window.scrollTo(0, document.body.scrollHeight);
    }

    function replaceLast(text) {
      const last = [...CHAT.children].reverse()
        .find(el => el.dataset.loading);
      if (last) {
        last.innerText = text;
        delete last.dataset.loading;
      }
    }
  </script>

<footer style="font-size:12px;color:#666;text-align:center;padding:16px;">
본 서비스는 법률정보 제공을 목적으로 하며, 변호사에 의한 법률자문이 아닙니다.<br/>
최종 판단과 책임은 사용자 본인에게 있습니다.
</footer>

</body>
</html>
