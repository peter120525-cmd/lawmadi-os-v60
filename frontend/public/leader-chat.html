<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>리더와 대화하기 - Lawmadi OS</title>
    <meta name="description" content="Lawmadi OS AI 전문 리더와 1:1로 법률 상담을 진행하세요.">
    <meta property="og:title" content="리더와 대화하기 | Lawmadi OS" />
    <meta property="og:description" content="AI 전문 리더와 1:1 법률 상담" />
    <meta property="og:image" content="https://lawmadi-db.web.app/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#3D8B5E" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <script src="/purify.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #3D8B5E;
            --purple: #5AAD7E;
            --bg-dark: #101A15;
            --bg-card: #1A2E22;
            --text-primary: #E4EDE8;
            --text-secondary: #8BAA9A;
            --accent: #4A9B6E;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #F4F8F5 0%, #E4EDE8 100%);
            color: #1A2E22;
            display: flex;
            flex-direction: column;
        }

        /* ── Profile Header ── */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #D4E4DA;
            flex-shrink: 0;
            z-index: 10;
        }
        .profile-header .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 1px solid #D4E4DA;
            background: transparent;
            cursor: pointer;
            color: #5D7D6D;
            text-decoration: none;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .profile-header .back-btn:hover { background: #E4EDE8; }
        .leader-avatar-img {
            width: 48px; height: 48px;
            border-radius: 12px;
            object-fit: cover;
            object-position: center top;
            border: 2px solid rgba(61, 139, 94, 0.2);
            flex-shrink: 0;
        }
        .leader-info { flex: 1; min-width: 0; }
        .leader-info .name {
            font-size: 1.1rem;
            font-weight: 800;
            color: #1A2E22;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .leader-info .meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }
        .leader-info .specialty-badge {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(61, 139, 94, 0.1);
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--primary);
        }
        .leader-info .personality {
            font-size: 0.78rem;
            color: #5D7D6D;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .profile-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 1px solid #D4E4DA;
            background: transparent;
            cursor: pointer;
            color: #5D7D6D;
            text-decoration: none;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .profile-link:hover { background: #E4EDE8; }

        /* ── Chat Viewport ── */
        .chat-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px 16px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .chat-viewport::-webkit-scrollbar { width: 6px; }
        .chat-viewport::-webkit-scrollbar-thumb { background: #8BAA9A; border-radius: 3px; }

        /* ── Welcome Message ── */
        .welcome-msg {
            align-self: center;
            text-align: center;
            padding: 32px 24px;
            max-width: 400px;
        }
        .welcome-msg .welcome-avatar {
            width: 72px; height: 72px;
            border-radius: 16px;
            object-fit: cover;
            object-position: center top;
            border: 3px solid rgba(61, 139, 94, 0.2);
            margin-bottom: 16px;
        }
        .welcome-msg h3 {
            font-size: 1.15rem;
            font-weight: 800;
            color: #1A2E22;
            margin-bottom: 8px;
        }
        .welcome-msg p {
            font-size: 0.9rem;
            color: #5D7D6D;
            line-height: 1.6;
        }

        /* ── Message Bubbles ── */
        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: msgSlide 0.3s ease; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.ai { align-self: flex-start; }

        .msg-row .bubble-avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            object-fit: cover;
            object-position: center top;
            flex-shrink: 0;
            border: 1.5px solid rgba(61, 139, 94, 0.2);
        }
        .msg-row.user .bubble-avatar { display: none; }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.65;
            word-break: break-word;
        }
        .msg-row.user .msg-bubble {
            background: linear-gradient(135deg, #2D7A4E 0%, #3D8B5E 50%, #5AAD7E 100%);
            color: white;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 2px 8px rgba(61, 139, 94, 0.3);
        }
        .msg-row.ai .msg-bubble {
            background: white;
            color: #1A2E22;
            border: 1px solid #D4E4DA;
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .msg-bubble strong { font-weight: 700; }
        .msg-bubble a { color: var(--primary); text-decoration: underline; }

        /* Typing indicator */
        .typing-row { display: flex; gap: 10px; align-self: flex-start; }
        .typing-row .bubble-avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            object-fit: cover;
            object-position: center top;
            flex-shrink: 0;
            border: 1.5px solid rgba(61, 139, 94, 0.2);
        }
        .typing-dots {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 20px;
            background: white;
            border: 1px solid #D4E4DA;
            border-radius: 18px 18px 18px 4px;
        }
        .typing-dots span {
            width: 8px; height: 8px;
            background: #7A9A88;
            border-radius: 50%;
            animation: typingDot 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Input Area ── */
        .input-area {
            flex-shrink: 0;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: white;
            border-top: 1px solid #D4E4DA;
        }
        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        .input-row textarea {
            flex: 1;
            border: 1px solid #D4E4DA;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            background: #F4F8F5;
            transition: border-color 0.2s;
        }
        .input-row textarea:focus { border-color: var(--primary); background: white; }
        .input-row textarea::placeholder { color: #7A9A88; }
        .send-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3D8B5E 0%, #5AAD7E 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }
        .send-btn:disabled { opacity: 0.4; cursor: default; }
        .send-btn:active:not(:disabled) { transform: scale(0.92); }
        .char-counter {
            font-size: 0.75rem;
            color: #5D7D6D;
            text-align: right;
            margin-top: 4px;
        }

        /* ── Loading State ── */
        .page-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }
        .page-loading .spinner {
            width: 40px; height: 40px;
            border: 3px solid #D4E4DA;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error Banner ── */
        .error-banner {
            padding: 12px 20px;
            background: #F5F0F0;
            border-bottom: 1px solid #E8BFBF;
            color: #B04444;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        /* ── Responsive ── */
        @media (min-width: 768px) {
            .chat-viewport { padding: 24px 32px; }
            .msg-row { max-width: 70%; }
            .input-area { padding: 16px 32px; }
        }
        @media (max-width: 480px) {
            .profile-header { padding: 12px 14px; gap: 10px; }
            .leader-avatar-img { width: 40px; height: 40px; border-radius: 10px; }
            .leader-info .name { font-size: 1rem; }
            .leader-info .personality { display: none; }
            .msg-row { max-width: 90%; }
        }

        /* ── Dark Mode ── */
        body.dark-mode { background: linear-gradient(135deg, #101A15 0%, #151F1A 100%); color: #E4EDE8; }
        body.dark-mode .profile-header { background: #1A2E22; border-color: rgba(255,255,255,0.08); }
        body.dark-mode .profile-header .back-btn { border-color: rgba(255,255,255,0.1); color: #7A9A88; }
        body.dark-mode .profile-header .back-btn:hover { background: rgba(255,255,255,0.05); }
        body.dark-mode .leader-info .name { color: #E4EDE8; }
        body.dark-mode .leader-info .personality { color: #5D7D6D; }
        body.dark-mode .profile-link { border-color: rgba(255,255,255,0.1); color: #7A9A88; }
        body.dark-mode .chat-viewport { background: linear-gradient(135deg, #101A15 0%, #151F1A 100%); }
        body.dark-mode .chat-viewport::-webkit-scrollbar-thumb { background: #2D4038; }
        body.dark-mode .welcome-msg h3 { color: #E4EDE8; }
        body.dark-mode .welcome-msg p { color: #7A9A88; }
        body.dark-mode .msg-row.ai .msg-bubble { background: rgba(26,46,34,0.8); border-color: rgba(74,155,110,0.15); color: #D4E4DA; }
        body.dark-mode .msg-row.user .msg-bubble { background: linear-gradient(135deg, #1A5E3A 0%, #3D8B5E 50%, #4A9B6E 100%); }
        body.dark-mode .typing-dots { background: rgba(26,46,34,0.8); border-color: rgba(74,155,110,0.15); }
        body.dark-mode .typing-dots span { background: #5D7D6D; }
        body.dark-mode .input-area { background: #1A2E22; border-color: rgba(255,255,255,0.08); }
        body.dark-mode .input-row textarea { background: rgba(16,26,21,0.6); border-color: rgba(255,255,255,0.1); color: #E4EDE8; }
        body.dark-mode .input-row textarea:focus { border-color: var(--primary); background: rgba(16,26,21,0.8); }
        body.dark-mode .input-row textarea::placeholder { color: #4A6B56; }
        body.dark-mode .error-banner { background: rgba(127,29,29,0.2); border-color: rgba(196,84,84,0.3); color: #D4A0A0; }
        body.dark-mode .char-counter { color: #7A9A88; }
        body.dark-mode #usageBanner { background: rgba(26,46,34,0.8) !important; color: #D4E4DA !important; border-color: rgba(255,255,255,0.08) !important; }

        /* ── Desktop: contained chat window ── */
        @media (min-width: 768px) {
            body {
                max-width: 720px;
                margin: 0 auto;
                border-left: 1px solid #D4E4DA;
                border-right: 1px solid #D4E4DA;
            }
            body.dark-mode {
                border-color: rgba(255,255,255,0.06);
            }
        }
        @media (min-width: 1024px) {
            .profile-header { padding: 12px 24px; }
            .msg-row { max-width: 85%; }
            .chat-viewport { padding: 24px 24px; }
        }
    </style>
    <script src="/cookie-consent.js"></script>
</head>
<body>
    <!-- Loading -->
    <div class="page-loading" id="pageLoading">
        <div class="spinner"></div>
        <p style="color:#5D7D6D;">리더 정보를 불러오는 중...</p>
    </div>

    <!-- Error Banner (hidden) -->
    <div class="error-banner" id="errorBanner"></div>
    <!-- Usage Banner (hidden) -->
    <div id="usageBanner" style="display:none;padding:8px 20px;font-size:0.82rem;font-weight:600;text-align:center;border-bottom:1px solid #D4E4DA;"></div>

    <!-- Profile Header (hidden until loaded) -->
    <div class="profile-header" id="profileHeader" style="display:none;">
        <a href="/leaders" class="back-btn" aria-label="뒤로가기">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <img class="leader-avatar-img" id="headerAvatar" src="" alt="">
        <div class="leader-info">
            <div class="name" id="headerName"></div>
            <div class="meta">
                <span class="specialty-badge" id="headerSpecialty"></span>
                <span class="personality" id="headerPersonality"></span>
            </div>
        </div>
        <a class="profile-link" id="profileLink" href="/leader-profile" aria-label="프로필 보기">
            <span class="material-symbols-outlined">person</span>
        </a>
    </div>

    <!-- Chat Viewport (hidden until loaded) -->
    <div class="chat-viewport" id="chatViewport" style="display:none;"></div>

    <!-- Input Area (hidden until loaded) -->
    <div class="input-area" id="inputArea" style="display:none;">
        <div class="input-row">
            <textarea id="userInput" rows="1" placeholder="메시지를 입력하세요..." maxlength="4000"></textarea>
            <button class="send-btn" id="sendBtn" disabled aria-label="전송">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
        <div class="char-counter" id="charCounter">0/4000</div>
    </div>

    <script src="/leader-chat.js"></script>
<script src="/lawmadi-monitor.js" defer></script>
<script src="/site-nav.js" defer></script>
<script src="/site-footer.js" defer></script>
<script src="/auth-modal.js" defer></script>
</body>
</html>
